<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | BRIDGES LOOP</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@700&family=Orbitron:wght@600;800&family=Roboto:wght@700&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #ffffff;
            background-image: none;
            color: #191818;
        }

        .header {
            background-color: rgba(255, 255, 255, 0.9);
            border-bottom: 2px solid #ccc;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .nav-link {
            color: #191818;
        }

        .nav-link:hover {
            color: var(--accent);
            text-shadow: none;
        }

        .panel-3d {
            background-color: #2e2e2f;
            background: linear-gradient(145deg, #323232, #272727);
            box-shadow: 5px 5px 15px #d9d9d9, -5px -5px 15px #ffffff;
            border: 1px solid #2e2e2f;
        }

        .panel-inner {
            background-color: #2e2e2f;
            color: #e0e0e0;
        }

        .form-group label {
            color: var(--accent);
        }

        .input-3d {
            background-color: #191818;
            border: 1px solid #3a3a3b;
            color: #e0e0e0;
            box-shadow: inset 2px 2px 5px #111111, inset -2px -2px 5px #222222;
        }

        .input-3d:focus {
            border-color: var(--accent);
            box-shadow: inset 2px 2px 5px #111111, inset -2px -2px 5px #222222, 0 0 8px rgba(245, 148, 0, 0.4);
        }

        .footer {
            background-color: #f0f0f0;
            border-top: 2px solid #ccc;
            color: #191818;
        }
    </style>
</head>

<body class="bg-white d-flex flex-column min-vh-100">
    <div class="crt-overlay"></div>
    <div class="scanlines"></div>

    <header class="header">
        <div class="brand">
            <a href="index.html" class="text-decoration-none d-flex align-items-center gap-1rem">
                <img class="logo" src="imagenes/bloopnew.png" alt="Bridges Loop Logo">
                <span class="brand-name">BRIDGES LOOP</span>
            </a>
        </div>
        <nav class="nav">
            <a href="index.html" class="nav-link">Inicio</a>
            <!-- <a href="servicios.html" class="nav-link">Servicios</a> -->
            <a href="cursos.html" class="nav-link">Cursos</a>
            <a href="contacto.html" class="nav-link">Contacto</a>
        </nav>
    </header>

    <main class="main-content flex-0-auto pt-6rem pb-4rem">
        <section class="section animate-on-load text-center mb-0 pb-2rem">
            <h2 class="section-title font-title color-accent">Horarios y Citas</h2>
            <p class="font-body color-dark" style="font-size: 1.2rem;">
                Lunes a viernes: 9:00 a.m. a 6:00 p.m.<br>
                Sábado y Domingo: cerrado.
            </p>
        </section>
    </main>

    <div class="contact-bg-wrapper">
        <div class="contact-inner-wrapper">
            <section id="contacto" class="animate-on-load w-100" style="max-width: 600px;">
                <h2 class="section-title font-title color-dark border-bottom-dark">// CONTACTO
                </h2>
                <div class="contact-form-wrapper panel-3d m-0 w-100">
                    <form class="contact-form panel-inner">
                        <div class="form-group">
                            <label for="email">> Correo_Terminal</label>
                            <input type="email" id="email" class="input-3d" required>
                        </div>
                        <div class="form-group">
                            <label for="message">> Transmisión</label>
                            <textarea id="message" rows="4" class="input-3d" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" id="btn-submit">Enviar Datos [ENTER]</button>
                        <div class="form-status" id="form-status"></div>
                    </form>
                </div>
            </section>
        </div>
    </div>

    <footer class="footer mt-auto">
        <p class="font-body">&copy; 2026 BRIDGES LOOP. Todos los derechos reservados. <span class="blink">_</span></p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
